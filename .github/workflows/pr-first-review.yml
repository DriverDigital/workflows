name: PR-first review (reusable)

# ─────────────────────────────────────────────────────────────────────────────
# REUSABLE WORKFLOW — Phase 3 PR-first rail. Runs as driver-digital-agents on a
# HUMAN, no-ticket PR: /code-review (comments only) + a marker comment + request a
# human reviewer. Home: DriverDigital/workflows.
# Holds AGENTS_GH_PAT + CLAUDE_CODE_OAUTH_TOKEN.
#
# SECURITY CONTRACT — DO NOT WEAKEN:
#   • The secret-holding /code-review step is guarded to SAME-REPO PRs only. Fork
#     PRs get no secrets under `pull_request` AND are explicitly skipped here.
#   • /code-review MUST be passed an `--allowedTools` list that NAMES the inline-comment poster
#     `mcp__github_inline_comment__create_inline_comment`. This is the action's PLUMBING, not
#     security theater: claude-code-action only INSTALLS the inline-comment MCP server when the
#     parsed allow-list contains a `mcp__github_inline_comment__*` (or `mcp__github__*`) entry
#     (src/mcp/install-mcp-server.ts). With NO list the server is never installed → the skill has
#     no tool to post with → "No buffered inline comments" (v1.3.0 shipped exactly this and could
#     never post; v1.2.0's narrow list was ALSO broken — it omitted the poster AND starved the
#     skill's analysis tools → 10/10 denials). So the list is REQUIRED, and it must be COMPLETE.
#   • The list is GENEROUS by design (Read/Glob/Grep/Bash/Task/TodoWrite/WebFetch + the poster) —
#     NOT to grant security but so the skill is not starved mid-review (the failure mode above).
#     The boundary is the PAT SCOPE — full stop. `AGENTS_GH_PAT` is a fine-grained PAT = Issues +
#     Pull-requests R/W, Contents:READ, no Admin. So every catastrophic op — push, merge, repo
#     delete/visibility, secrets, workflow edits, issue delete — needs Contents:Write or Admin and
#     403s SERVER-SIDE no matter what the agent runs, even with broad Bash. NO `--disallowedTools`:
#     the only irreversible ops the PAT can do (delete issue/PR comments or labels) are low-stakes +
#     recreatable (our issues regenerate from Bonsai tasks), so per Maria's catastrophe-only call we
#     accept them rather than whack-a-mole. Token exfil via WebFetch/curl is reversible by rotation
#     AND unpreventable given broad Bash anyway. Net: a COMPLETE allow-list makes the rail work; the
#     read-only-on-code PAT IS the guardrail. The same-repo / no-fork / private gates keep it trusted.
#   • Read the author from the PR payload, NOT github.actor (which flips to a human
#     on reopen of a bot PR).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      default-reviewer-handle:
        description: GitHub handle to request as reviewer (default = Maria). Per-repo override = vars.PR_REVIEWER_HANDLE.
        type: string
        default: mcarter-astronautdev
    secrets:
      AGENTS_GH_PAT:           { required: true }
      CLAUDE_CODE_OAUTH_TOKEN: { required: true }

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login != 'claude[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Same-repo guard (never run the secret-holding review on a fork PR)
        id: guard
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          THIS_REPO: ${{ github.repository }}
        run: |
          if [ "$HEAD_REPO" = "$THIS_REPO" ]; then
            echo "same_repo=true" >> "$GITHUB_OUTPUT"
          else
            echo "same_repo=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Fork PR ($HEAD_REPO) — skipping (external-contributor PRs are deferred)."
          fi

      - name: No-ticket detection (ticketed rail owns PRs that resolve a Bonsai ticket)
        if: steps.guard.outputs.same_repo == 'true'
        id: ticket
        env:
          GH_TOKEN: ${{ secrets.AGENTS_GH_PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          UUID_RE='uuid=[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'

          # Resolve the issues this PR closes. We MUST distinguish "API call failed" (can't tell) from
          # "no linked issues" (empty result): a fail-OPEN default on error would misroute a ticketed PR
          # into the PR-first rail. So on ANY gh failure we fail CLOSED — emit has_ticket=unknown (the
          # downstream steps gate on =='false', so the rail skips), warn a human, and exit 0 so a transient
          # API hiccup leaves the job green rather than blocking the PR.
          if ! refs=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
                        --json closingIssuesReferences --jq '.closingIssuesReferences[].number'); then
            echo "has_ticket=unknown" >> "$GITHUB_OUTPUT"
            echo "::warning::could not resolve closing issues for PR #$PR_NUMBER — skipping the PR-first rail (fail-closed) to avoid misrouting a ticketed PR."
            exit 0
          fi

          HAS_TICKET=false
          for n in $refs; do
            if ! ibody=$(gh issue view "$n" --repo "$REPO" --json body --jq '.body'); then
              echo "has_ticket=unknown" >> "$GITHUB_OUTPUT"
              echo "::warning::could not read linked issue #$n — skipping the PR-first rail (fail-closed) to avoid misrouting a ticketed PR."
              exit 0
            fi
            if printf '%s' "$ibody" | grep -qiE "$UUID_RE"; then HAS_TICKET=true; break; fi
          done
          echo "has_ticket=$HAS_TICKET" >> "$GITHUB_OUTPUT"
          [ "$HAS_TICKET" = "true" ] && echo "::notice::PR resolves a Bonsai ticket — ticketed rail owns it; skipping." || true

      - name: Checkout PR head (same-repo / trusted)
        if: ${{ steps.guard.outputs.same_repo == 'true' && steps.ticket.outputs.has_ticket == 'false' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Run /code-review (comments only — execution-free, read-only tools)
        if: ${{ steps.guard.outputs.same_repo == 'true' && steps.ticket.outputs.has_ticket == 'false' }}
        uses: anthropics/claude-code-action@806af32823ef69c8ef357086c573a902af641307 # v1
        with:
          github_token: ${{ secrets.AGENTS_GH_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # NEVER set anthropic_api_key (OAuth / Max billing only).
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          # The prompt carries Driver house-style review conventions + a lowered (>50) reporting threshold.
          # MODEL/EFFORT (Maria 2026-06-24): `opus` ALIAS (drift to latest Opus with the CLI) + `--effort xhigh`
          # (what "ultracode" is under the hood; valid: low/medium/high/xhigh/max). No superpowers here by
          # design — the reviewer is the specialized /code-review skill; the implementer leg gets superpowers.
          # ⚠️ --allowedTools IS REQUIRED + MUST NAME THE POSTER (corrected v1.3.1, 2026-06-24). The earlier
          # "drop the list" theory (v1.3.0) was BACKWARDS: claude-code-action only installs the inline-comment
          # MCP server when the parsed allow-list contains `mcp__github_inline_comment__*` (or `mcp__github__*`)
          # — src/mcp/install-mcp-server.ts. With NO list the server is never installed → "No buffered inline
          # comments" → the rail posts nothing (v1.3.0 ran 17 turns / 7 denials / 0 posts on PR #18, while
          # CodeRabbit caught the same bugs). v1.2.0's narrow list was ALSO broken: it omitted the poster
          # (no server) AND starved the skill's git/analysis tools (10 denials). So the list must EXIST and be
          # COMPLETE. The list below is GENEROUS — Read/Glob/Grep/Bash/Task/TodoWrite/WebFetch + the poster —
          # so the skill (and the Task subagents the prompt invites) is never starved. This is PLUMBING, not a
          # security grant: the GUARDRAIL is the PAT SCOPE. AGENTS_GH_PAT is Contents:READ / no Admin, so push /
          # merge / repo delete / secrets / workflow edits / issue delete all 403 server-side even with broad
          # Bash. NO --disallowedTools (catastrophe-only call). Token exfil via WebFetch/Bash is reversible by
          # rotation + unpreventable anyway. The top-level marker stays in the separate run: step below.
          claude_args: '--model opus --effort xhigh --allowedTools "mcp__github_inline_comment__create_inline_comment,Read,Glob,Grep,Bash,Task,TodoWrite,WebFetch"'
          prompt: |
            /code-review:code-review --comment

            Driver Digital review conventions — apply on top of the skill's defaults:
            - Threshold: surface every finding scoring above 50 (the skill defaults to flagging only the ≥80) — be more inclusive than usual.
            - Voice: first person, as one reviewer ("I noticed…", "I'd do X if I were you") — never "we", never a clipped linter tone; warm and collaborative.
            - Specific and cited, always: every comment names the exact file and line and what's wrong — never a vague class of problems.
            - Advise the fix; never offer to make, apply, or "dig into" it — it's the author's PR.
            - Plain language, minimal jargon.
            - If you post a summary comment, open with what's genuinely working well, then list the issues most-important first.
            - No tool-attribution footer — no "🤖 Generated with Claude Code" line and no "react with 👍/👎" line.
            - You MAY dispatch parallel subagents (the Task tool) to review independent parts of the diff at once for the best result fastest — optional, your judgment. Stay read-only: review and report findings only, never attempt a write (no `gh` writes, no edits) — the review token is read-only on code, so edits/pushes can't land anyway.

      - name: Post marker + request a human reviewer
        if: ${{ steps.guard.outputs.same_repo == 'true' && steps.ticket.outputs.has_ticket == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.AGENTS_GH_PAT }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          OVERRIDE: ${{ vars.PR_REVIEWER_HANDLE }}
          DEFAULT_HANDLE: ${{ inputs.default-reviewer-handle }}
        run: |
          HANDLE="${OVERRIDE:-$DEFAULT_HANDLE}"
          # GitHub 422s if you request the PR author as their own reviewer — pre-skip that.
          if [ -n "$HANDLE" ] && [ "$HANDLE" != "$AUTHOR" ]; then
            gh pr edit "$PR" --repo "$REPO" --add-reviewer "$HANDLE" || echo "::warning::could not add reviewer '$HANDLE'"
            NOTE="Requested review from @$HANDLE."
          else
            NOTE="No reviewer auto-requested (handle='$HANDLE', author='$AUTHOR')."
            echo "::notice::$NOTE"
          fi
          printf '🤖 Automated PR-first review ran (no Bonsai ticket) — findings, if any, are inline above. %s\n' "$NOTE" > marker.md
          gh pr comment "$PR" --repo "$REPO" --body-file marker.md --edit-last --create-if-none \
            || gh pr comment "$PR" --repo "$REPO" --body-file marker.md
